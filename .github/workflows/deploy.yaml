name: 'DailyBrew Application Deploy'

# DISABLED during the atomic-deploy cutover (PR #279 + cutover runbook).
# The prod host's directory layout has moved from in-place
# /var/www/dailybrew/* to releases/N + shared/ + current → so this
# in-place workflow's `git fetch` + `touch public/.maintenance` would
# fail. Re-enable by uncommenting the trigger if you need to roll back.
on:
    workflow_dispatch:           # manual only — emergency rollback
    # release:
    #     types: [published]

jobs:
    deploy:
        name:        'Deploy to production'
        environment: release
        runs-on:     ubuntu-latest
        steps:
            -   name: Deploy to production using ssh
                uses: appleboy/ssh-action@v1.0.3
                with:
                    host:            ${{ secrets.HOST }}
                    username:        ${{ secrets.USERNAME }}
                    password:        ${{ secrets.PASSWORD }}
                    port:            ${{ secrets.PORT }}
                    command_timeout: ${{ secrets.TIMEOUT }}
                    script:          |
                                     set -euo pipefail
                                     cd ${{ secrets.PROJECT_FOLDER }}
                                     sudo touch public/.maintenance
                                     sudo git fetch --tags --force https://${{ secrets.ACCOUNT_GITHUB_USERNAME }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ secrets.ACCOUNT_GITHUB_USERNAME }}/daily-brew.git
                                     sudo git checkout ${{ github.event.release.tag_name }}
                                     sudo chown -R $(whoami) ${{ secrets.PROJECT_FOLDER }}
                                     composer install --no-dev --optimize-autoloader
                                     composer dump-env prod
                                     composer dump-autoload --no-dev --classmap-authoritative
                                     php bin/console doctrine:migrations:migrate --no-interaction
                                     php bin/console cache:clear --env=prod
                                     sudo npm ci --legacy-peer-deps
                                     sudo npm run router:generate
                                     sudo npm run build
                                     # ---- Next.js frontend (Phase 6 cutover prep) ----
                                     # Build the Next app alongside the legacy SPA. The systemd unit
                                     # `dailybrew-next.service` (provisioned manually on the host)
                                     # serves traffic nginx routes to it. Until the proxy flip the
                                     # SPA remains the default; this just keeps the build artifacts
                                     # ready so the cutover is a single nginx change.
                                     cd frontend
                                     sudo npm ci
                                     sudo npm run build
                                     # `next.config.ts` sets `output: "standalone"`, so the build
                                     # produces `.next/standalone/server.js`. Per Next docs the
                                     # static + public assets aren't auto-copied — do it here so
                                     # `node .next/standalone/server.js` runs self-contained.
                                     # Clear stale copies from previous deploys first — `cp -R src dst`
                                     # where `dst` exists nests the source inside it (would end up at
                                     # `.next/standalone/.next/static/static/` on re-deploys).
                                     sudo rm -rf .next/standalone/.next/static .next/standalone/public
                                     sudo cp -R .next/static .next/standalone/.next/static
                                     sudo cp -R public .next/standalone/public
                                     cd ..
                                     sudo chown -R www-data:www-data ${{ secrets.PROJECT_FOLDER }}
                                     sudo rm -f public/.maintenance
                                     sudo systemctl restart php8.5-fpm
                                     # Restart the Next process only if its unit has been
                                     # provisioned. During the pre-cutover phase the unit may not
                                     # exist; the build artifacts are still produced for when it
                                     # does, and the deploy doesn't fail.
                                     if systemctl list-unit-files dailybrew-next.service >/dev/null 2>&1; then
                                       sudo systemctl restart dailybrew-next
                                     fi
