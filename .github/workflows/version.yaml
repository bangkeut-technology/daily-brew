name: 'DailyBrew Version & Release'

on:
    push:
        branches:
            - main

permissions:
    contents:      write
    pull-requests: write

jobs:
    release-please:
        name:    'Version bump & changelog'
        runs-on: ubuntu-latest
        steps:
            -
                name: Run release-please
                id:   release
                uses: googleapis/release-please-action@v4
                with:
                    release-type: simple
                    token:        ${{ secrets.GITHUB_TOKEN }}

            -
                name: Extract release PR number
                if:   steps.release.outputs.pr
                id:   pr-info
                run:  echo "number=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')" >> "$GITHUB_OUTPUT"

            -
                name: Auto-merge release PR
                if:   steps.pr-info.outputs.number
                run:  gh pr merge --auto --squash "${{ steps.pr-info.outputs.number }}"
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
