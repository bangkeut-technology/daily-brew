name: 'DailyBrew Application Deploy (atomic)'

# Atomic, zero-downtime deploy via Deployer. Each release builds into a fresh
# `releases/N/` directory and an atomic symlink swap promotes it; PHP-FPM is
# gracefully reloaded so in-flight requests are not dropped.
#
# release.types: [published] auto-fires this workflow on every release-please
# publish. The legacy deploy.yaml has its `release` trigger commented out;
# only one workflow runs per release tag.

on:
    release:
        types: [published]
    workflow_dispatch:           # manual trigger for re-deploys / hotfixes
        inputs:
            tag:
                description: 'Release tag to deploy (e.g. v1.103.0). Defaults to latest.'
                required: false
                type: string

# Serialise deploys per environment. Two release tags landing within the build
# window otherwise spawn parallel runs that race for Deployer's host lock; one
# fails fast with a confusing error. Concurrency keeps them sequential.
concurrency:
    group: deploy-production
    cancel-in-progress: false

jobs:
    deploy:
        name:        'Atomic deploy to production'
        environment: release
        runs-on:     ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Resolve deploy tag
                id:   tag
                run:  |
                      if [ -n "${{ inputs.tag }}" ]; then
                        echo "deploy_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
                      elif [ "${{ github.event_name }}" = "release" ]; then
                        echo "deploy_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
                      else
                        echo "deploy_tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
                      fi

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'
                    tools:       composer:v2

            -   name: Install Deployer (dev deps only the runner needs)
                # Deployer runs on the CI runner (it SSHes to prod). Skip
                # post-install scripts — we don't need cache:clear or
                # assets:install on the runner side, just vendor/bin/dep.
                run:  composer install --no-interaction --prefer-dist --no-scripts

            -   name: Configure SSH
                uses: webfactory/ssh-agent@v0.9.0
                with:
                    ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

            -   name: Trust the production host key
                run:  |
                      mkdir -p ~/.ssh
                      ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts

            -   name: Deploy
                env:
                    # GITHUB_TOKEN is auto-injected and scoped to contents:read
                    # on this repo — Deployer's repository URL bakes it in for
                    # the remote `git clone` (prod has no GitHub SSH key).
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    DEPLOY_TAG:  ${{ steps.tag.outputs.deploy_tag }}
                    DEPLOY_HOST: ${{ secrets.HOST }}
                    DEPLOY_USER: ${{ secrets.USERNAME }}
                    DEPLOY_PORT: ${{ secrets.PORT }}
                    DEPLOY_PATH: ${{ secrets.PROJECT_FOLDER }}
                run:  vendor/bin/dep deploy production --revision "${DEPLOY_TAG}" -vv

            -   name: Rollback on failure
                if:   failure()
                env:
                    DEPLOY_HOST: ${{ secrets.HOST }}
                    DEPLOY_USER: ${{ secrets.USERNAME }}
                    DEPLOY_PORT: ${{ secrets.PORT }}
                    DEPLOY_PATH: ${{ secrets.PROJECT_FOLDER }}
                run:  vendor/bin/dep deploy:unlock production || true
