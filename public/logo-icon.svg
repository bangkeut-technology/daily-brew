<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="#6B4226"/>

  <!-- Cup body -->
  <rect x="108" y="190" width="248" height="200" rx="24" fill="white"/>

  <!-- Cup opening (darker coffee) -->
  <rect x="118" y="190" width="228" height="42" rx="12" fill="#3E2212"/>
  <!-- Rim top highlight -->
  <rect x="108" y="184" width="248" height="30" rx="15" fill="white"/>

  <!-- Handle -->
  <path d="M356 230 C420 230, 420 350, 356 350" stroke="white" stroke-width="32" fill="none" stroke-linecap="round"/>

  <!-- Steam line left -->
  <path d="M196 160 C186 130, 210 115, 200 85" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Steam line center -->
  <path d="M232 150 C222 120, 246 105, 236 75" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.65"/>
  <!-- Steam line right -->
  <path d="M268 160 C258 130, 282 115, 272 85" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Clock circle -->
  <circle cx="232" cy="315" r="56" fill="none" stroke="#6B4226" stroke-width="5" opacity="0.25"/>

  <!-- Clock hour marks -->
  <line x1="232" y1="265" x2="232" y2="275" stroke="#6B4226" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="232" y1="355" x2="232" y2="365" stroke="#6B4226" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="182" y1="315" x2="192" y2="315" stroke="#6B4226" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="272" y1="315" x2="282" y2="315" stroke="#6B4226" stroke-width="5" stroke-linecap="round" opacity="0.3"/>

  <!-- Hour hand (pointing to ~10) -->
  <line x1="232" y1="315" x2="215" y2="280" stroke="#6B4226" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="232" y1="315" x2="262" y2="295" stroke="#6B4226" stroke-width="4" stroke-linecap="round" opacity="0.45"/>
  <!-- Center dot -->
  <circle cx="232" cy="315" r="5" fill="#6B4226" opacity="0.4"/>

  <!-- Bottom plate / saucer -->
  <ellipse cx="232" cy="405" rx="150" ry="20" fill="white" opacity="0.15"/>
</svg>
