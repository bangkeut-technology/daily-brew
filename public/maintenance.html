<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyBrew - Maintenance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #FAF7F2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.62);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.85);
            border-radius: 1rem;
            padding: 3rem 2.5rem;
            max-width: 420px;
            text-align: center;
        }
        h1 { color: #6B4226; font-size: 1.5rem; margin-bottom: 0.75rem; }
        p { color: #7C6860; font-family: system-ui, sans-serif; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <h1>We'll be right back</h1>
        <p>DailyBrew is being updated. This usually takes less than a minute.</p>
    </div>
</body>
</html>
