lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: '%jwt_token_ttl%'
    remove_token_from_body_when_cookies_used: false
    set_cookies:
        BEARER:
            lifetime: 2592000
            samesite: lax
            # Scoped to /api/v1 so the cookie is NOT sent to /api/token/refresh.
            # Otherwise the JWT authenticator picks up the expired BEARER on the
            # refresh endpoint and rejects the request before gesdinet's refresh
            # authenticator gets a chance to run.
            path: /api/v1
            httpOnly: true
            secure: auto
            split:  []
    token_extractors:
        cookie:
            enabled: true
            name: BEARER
        authorization_header:
            enabled: true
            prefix: Bearer
