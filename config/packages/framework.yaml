# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # SameSite=None required for Apple Sign In (cross-origin POST callback).
    session:
        enabled: true
        cookie_secure: auto
        cookie_samesite: none
        cookie_httponly: true
        cookie_domain: '%env(default::COOKIE_DOMAIN)%'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
