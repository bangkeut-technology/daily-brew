security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        daily_brew_user_provider:
            id: App\Security\Provider\UserProvider
    role_hierarchy:
        ROLE_ADMIN:
            - ROLE_USER
        ROLE_SUPER_ADMIN:
            - ROLE_ADMIN
    firewalls:
        login:
            pattern:   ^/api/login
            stateless: true
            json_login:
                check_path:      daily_brew_api_login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            provider:  daily_brew_user_provider

        api:
            pattern:     ^/api
            entry_point: jwt
            jwt:         ~
            refresh_jwt:
                check_path: gesdinet_jwt_refresh_token
            provider:    daily_brew_user_provider
            context:     'billandgo'

        console_area:
            pattern:  ^/console
            provider: daily_brew_user_provider
            json_login:
                check_path: daily_brew_security_login
            logout:
                path:   daily_brew_security_logout
                target: daily_brew_security_login
            context:  'billandgo'
            custom_authenticators:
                - App\Security\JsonAuthenticator

    access_control:
        - { path: ^/api/(login|token/refresh|doc), roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/(en|fr|km)/(login),     roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/(en|fr|km),             roles: [ ROLE_USER ] }
        - { path: ^/console,                       roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm:   auto
                cost:        4
                time_cost:   3
                memory_cost: 10
