security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        daily_brew_user_provider:
            entity:
                class: App\Entity\User
                property: emailCanonical

    firewalls:
        dev:
            pattern: '^/(_profiler|_wdt|assets|build)/'
            security: false

        webhooks:
            pattern: '^/api/v1/webhooks'
            stateless: true
            security: false

        support:
            pattern: '^/api/v1/support'
            stateless: true
            security: false

        auth:
            pattern: '^/api/v1/[a-z]+/auth'
            stateless: true
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                username_path: email
                check_path: daily_brew_api_login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            provider: daily_brew_user_provider
            context:  'dailybrew'

        basilbook:
            pattern: '^/api/v1/basilbook'
            stateless: true
            custom_authenticators:
                - App\Security\BasilBookApiKeyAuthenticator
            provider: daily_brew_user_provider

        # Dedicated firewall for the refresh endpoint. Must come BEFORE the
        # `api` firewall so it matches first.
        #
        # Why a separate firewall: the `api` firewall has the JWT authenticator
        # listed alongside refresh_jwt. iOS NSURLSession sends the BEARER
        # cookie (containing the expired JWT) on /api/token/refresh despite
        # the cookie's path=/api/v1 attribute — RFC 6265 path scoping is
        # observed loosely on iOS. With both authenticators in the same
        # firewall, JWT runs first, validates the expired cookie, returns
        # "Expired JWT Token" 401, and refresh_jwt never gets a chance.
        # The client classifies this 401 as a fatal refresh failure and wipes
        # the session — the exact 1-hour silent logout we kept hitting.
        #
        # Scoping the refresh path to its own firewall with ONLY refresh_jwt
        # means the JWT authenticator can't intercept regardless of which
        # cookies iOS attaches. The body extractor still reads `refresh_token`
        # from the JSON body as before; the response handler still attaches
        # the new BEARER cookie via the AuthenticationSuccessEvent.
        token_refresh:
            pattern: ^/api/token/refresh
            stateless: true
            refresh_jwt:
                check_path: gesdinet_jwt_refresh_token
            provider: daily_brew_user_provider

        api:
            pattern: ^/api
            stateless: true
            entry_point: jwt
            jwt: ~
            refresh_jwt:
                check_path: gesdinet_jwt_refresh_token
            provider: daily_brew_user_provider
            context:  'dailybrew'

        oauth:
            pattern: '^/oauth/'
            stateless: false
            security: false

        main:
            pattern: ^/
            security: false


    access_control:
        - path: '^/api/token/refresh'
          roles: PUBLIC_ACCESS
        - path: '^/api/v1/basilbook'
          roles: IS_AUTHENTICATED_FULLY
        - path: '^/api/v1/webhooks'
          roles: PUBLIC_ACCESS
        - path: '^/api/v1/support'
          roles: PUBLIC_ACCESS
        - path: '^/api/v1/checkin'
          roles: IS_AUTHENTICATED_FULLY
        - path: '^/api/v1/devices'
          roles: IS_AUTHENTICATED_FULLY
        - path: '^/api/v1/[a-z]+/auth'
          roles: PUBLIC_ACCESS
        - path: '^/api/v1/[a-z]+/features'
          roles: PUBLIC_ACCESS
        - path: '^/api/v1/[a-z]+/admin'
          roles: ROLE_SUPER_ADMIN
        - path: '^/api'
          roles: IS_AUTHENTICATED_FULLY

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
