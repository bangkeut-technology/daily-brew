security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        daily_brew_user_provider:
            id: App\Security\Provider\UserProvider
    role_hierarchy:
        ROLE_DEMO:
            - ROLE_USER
        ROLE_ADMIN:
            - ROLE_USER
        ROLE_SUPER_ADMIN:
            - ROLE_ADMIN
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        oauth_auth:
            pattern:   ^/oauth/auth
            stateless: false
            lazy:      true

        oauth_connect:
            pattern:   ^/oauth/connect
            stateless: false
            provider:  daily_brew_user_provider
            context:   '%env(string:DAILY_BREW_CONTEXT)%'

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                username_path: email
                check_path: daily_brew_api_login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            provider: daily_brew_user_provider

        api:
            pattern: ^/api
            entry_point: jwt
            jwt: ~
            refresh_jwt:
                check_path: gesdinet_jwt_refresh_token
            provider: daily_brew_user_provider
            context: '%env(string:DAILY_BREW_CONTEXT)%'
            logout:
                path: gesdinet_jwt_refresh_token_invalidate

    access_control:
        - { path: ^/api/(login|token/refresh|doc), roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/(en|fr|km)/(login),     roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/(en|fr|km),             roles: [ ROLE_USER ] }
        - { path: ^/api/token/invalidate,          roles: PUBLIC_ACCESS }
        - { path: ^/oauth/auth,                    roles: PUBLIC_ACCESS }
        - { path: ^/oauth/connect,                 roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
