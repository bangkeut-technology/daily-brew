security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        daily_brew_user_provider:
            entity:
                class: App\Entity\User
                property: emailCanonical

    firewalls:
        dev:
            pattern: '^/(_profiler|_wdt|assets|build)/'
            security: false

        webhooks:
            pattern: '^/api/v1/webhooks'
            stateless: true
            security: false

        auth:
            pattern: '^/api/v1/[a-z]+/auth'
            stateless: true
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                username_path: email
                check_path: daily_brew_api_login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            provider: daily_brew_user_provider

        api:
            pattern: ^/api
            stateless: true
            entry_point: jwt
            jwt: ~
            refresh_jwt:
                check_path: gesdinet_jwt_refresh_token
            provider: daily_brew_user_provider

        main:
            pattern: ^/
            stateless: true
            jwt: ~
            provider: daily_brew_user_provider

    access_control:
        - path: '^/api/v1/webhooks'
          roles: PUBLIC_ACCESS
        - path: '^/api/v1/checkin'
          roles: IS_AUTHENTICATED_FULLY
        - path: '^/api/v1/[a-z]+/auth'
          roles: PUBLIC_ACCESS
        - path: '^/api/v1/token/refresh'
          roles: PUBLIC_ACCESS
        - path: '^/api'
          roles: IS_AUTHENTICATED_FULLY

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
