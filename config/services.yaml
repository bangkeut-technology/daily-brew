# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    paddle_environment:               '%env(PADDLE_ENVIRONMENT)%'
    paddle_webhook_secret:            '%env(PADDLE_WEBHOOK_SECRET)%'
    paddle_api_key:                   '%env(PADDLE_API_KEY)%'
    paddle_client_side_token:         '%env(PADDLE_CLIENT_SIDE_TOKEN)%'
    paddle_price_id_espresso_monthly: '%env(PADDLE_PRICE_ID_ESPRESSO_MONTHLY)%'
    paddle_price_id_espresso_annual:  '%env(PADDLE_PRICE_ID_ESPRESSO_ANNUAL)%'
    revenuecat_webhook_secret:        '%env(REVENUECAT_WEBHOOK_SECRET)%'
    no_reply_email:                   '%env(NO_REPLY_EMAIL)%'
    google_client_id:                 '%env(GOOGLE_CLIENT_ID)%'
    google_ios_client_id:             '%env(GOOGLE_IOS_CLIENT_ID)%'
    google_android_client_id:         '%env(GOOGLE_ANDROID_CLIENT_ID)%'
    apple_client_id:                  '%env(APPLE_CLIENT_ID)%'
    apple_ios_client_id:              '%env(APPLE_IOS_CLIENT_ID)%'
    max_free_employees:               10
    contact_email:                    'support@dailybrew.work'
    jwt_token_ttl:                    3600
    supportdock_api_key:              '%env(SUPPORTDOCK_API_KEY)%'
    mailgun_webhook_signing_key:      '%env(MAILGUN_WEBHOOK_SIGNING_KEY)%'

services:
    _defaults:
        autowire:      true
        autoconfigure: true
        bind:
            $maxFreeEmployees:             '%max_free_employees%'
            $contactEmail:                 '%contact_email%'
            $googleClientId:               '%google_client_id%'
            $googleIosClientId:            '%google_ios_client_id%'
            $googleAndroidClientId:        '%google_android_client_id%'
            $appleClientId:                '%apple_client_id%'
            $appleIosClientId:             '%apple_ios_client_id%'
            $kernelEnvironment:            '%kernel.environment%'
            $paddleEnvironment:            '%paddle_environment%'
            $paddleApiKey:                 '%paddle_api_key%'
            $paddleClientSideToken:        '%paddle_client_side_token%'
            $paddlePriceIdEspressoMonthly: '%paddle_price_id_espresso_monthly%'
            $paddlePriceIdEspressoAnnual:  '%paddle_price_id_espresso_annual%'
            $noReplyEmail:                 '%no_reply_email%'
            $supportdockApiKey:            '%supportdock_api_key%'
            $mailgunWebhookSigningKey:     '%mailgun_webhook_signing_key%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\EventSubscriber\RateLimitSubscriber:
        arguments:
            $authLoginLimiter:    '@limiter.auth_login'
            $authRegisterLimiter: '@limiter.auth_register'

    App\EventListener\AuthenticationSuccessListener:
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_success, method: onAuthenticationSuccessResponse }

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
